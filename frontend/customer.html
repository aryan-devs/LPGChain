<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer Dashboard - LPGChain</title>
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>
    <div class="navbar">
  <h2>LPGChain</h2>
  <div>
    <a href="admin.html">Admin</a>
    <a href="distributor.html">Distributor</a>
    <a href="customer.html">Customer</a>
    <a href="transactions.html">Transactions</a>
    <a href="login.html">Logout</a>
  </div>
</div>
  <div class="container">
    <h1>Customer Dashboard</h1>

    <div class="card-grid">
      <div class="card">
        <h3>Booking Status</h3>
        <p>Pending</p>
      </div>
      <div class="card">
        <h3>Distributor Stock</h3>
        <p>80</p>
      </div>
      <div class="card">
        <h3>Complaint Status</h3>
        <p>Open</p>
      </div>
    </div>

    <div class="section">
      <h2>Book LPG Cylinder</h2>
      <input type="text" placeholder="Customer Name">
      <select>
        <option>Select Distributor</option>
        <option>Distributor A</option>
        <option>Distributor B</option>
      </select>
      <button>Book Now</button>
    </div>

    <div class="section">
      <h2>Raise Complaint</h2>
      <textarea rows="4" placeholder="Write your complaint here..."></textarea>
      <button>Submit Complaint</button>
    </div>
  </div>
</body>
</html>
