<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Customer Register - LPGChain</title>
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <div class="container">
        <div class="login-box">
            <h1>Create Customer Account</h1>
            <p>Register to book LPG and track delivery</p>

            ```
            <form id="registerForm">
                <input type="text" id="name" placeholder="Full Name" required />
                <input type="email" id="email" placeholder="Email Address" required />

                <!-- Password -->
                <div style="position: relative;">
                    <input type="password" id="password" placeholder="Password" required
                        style="width: 100%; padding-right: 50px;" oncopy="return false" oncut="return false"
                        onpaste="return false" />
                    <span onclick="togglePassword('password')"
                        style="position: absolute; right: 15px; top: 14px; cursor: pointer; font-size: 16px;">
                        👁
                    </span>
                </div>

                <!-- Confirm Password -->
                <div style="position: relative;">
                    <input type="password" id="confirmPassword" placeholder="Confirm Password" required
                        style="width: 100%; padding-right: 50px;" oncopy="return false" oncut="return false"
                        onpaste="return false" />
                    <span onclick="togglePassword('confirmPassword')"
                        style="position: absolute; right: 15px; top: 14px; cursor: pointer; font-size: 16px;">
                        👁
                    </span>
                </div>

                <input type="text" id="area" placeholder="Area / Address" required />

                <button type="submit">Create Account</button>
            </form>

            <p style="margin-top: 15px; font-size: 14px;">
                Already have an account? <a href="login.html">Login</a>
            </p>
        </div>
        ```

    </div>

    <script>
        function togglePassword(id) {
            const input = document.getElementById(id);
            input.type = input.type === "password" ? "text" : "password";
        }
    </script>

    <script>
        const form = document.getElementById("registerForm");

        form.addEventListener("submit", async function (e) {
            e.preventDefault();

            const name = document.getElementById("name").value;
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            const confirmPassword = document.getElementById("confirmPassword").value;
            const area = document.getElementById("area").value;

            if (password !== confirmPassword) {
                alert("Passwords do not match!");
                return;
            }

            const userData = {
                name: name,
                email: email,
                password: password,
                area: area
            };

            try {
                const response = await fetch("http://localhost:8080/api/users/register", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(userData)
                });

                const result = await response.text();
                alert(result);

                if (result.includes("successfully")) {
                    form.reset();
                    window.location.href = "login.html";
                }

            } catch (error) {
                alert("Error connecting to backend!");
                console.error(error);
            }
        });
    </script>

</body>

</html>
