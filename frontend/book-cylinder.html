<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Book Cylinder - LPGChain</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: linear-gradient(135deg, #0b2c5c, #1e4d91);
      color: white;
    }

    .container {
      max-width: 500px;
      margin: 60px auto;
      background: white;
      color: black;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    h2 {
      text-align: center;
      color: #0b2c5c;
    }

    input, select {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #2f65d9;
      color: white;
      border: none;
      border-radius: 8px;
      margin-top: 15px;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background: #1e4fbf;
    }

    .back {
      text-align: center;
      margin-top: 15px;
    }

    .back a {
      color: #0b2c5c;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>📦 Book LPG Cylinder</h2>

  <form id="bookingForm">
    <input type="text" id="name" placeholder="Enter Full Name" required>
    
    <select id="area" required onchange="loadDistributor()">
      <option value="">Select Area</option>
    </select>

    <input type="text" id="distributor" placeholder="Assigned Distributor" readonly>

    <select id="type" required>
      <option value="">Select Cylinder Type</option>
    </select>

    <button type="submit">Book Now</button>
  </form>

  <div class="back">
    <a href="customer-dashboard.html">⬅ Back to Dashboard</a>
  </div>
</div>

<script>
  // Load areas on page load
  async function loadAreas() {
    try {
      const response = await fetch("http://localhost:8080/api/bookings/areas");
      const areas = await response.json();

      const areaSelect = document.getElementById("area");
      areas.forEach(area => {
        const option = document.createElement("option");
        option.value = area.name;
        option.textContent = area.name;
        areaSelect.appendChild(option);
      });
    } catch (error) {
      console.error("Error loading areas:", error);
    }
  }

  // Load cylinder types on page load
  async function loadCylinderTypes() {
    try {
      const response = await fetch("http://localhost:8080/api/bookings/cylinder-types");
      const types = await response.json();

      const typeSelect = document.getElementById("type");
      types.forEach(type => {
        const option = document.createElement("option");
        option.value = type.name;
        option.textContent = type.name;
        typeSelect.appendChild(option);
      });
    } catch (error) {
      console.error("Error loading cylinder types:", error);
    }
  }

  // Load distributor based on selected area
  async function loadDistributor() {
    const area = document.getElementById("area").value;
    
    if (!area) {
      document.getElementById("distributor").value = "";
      return;
    }

    try {
      const response = await fetch(`http://localhost:8080/api/bookings/distributor/${area}`);
      const distributor = await response.json();
      document.getElementById("distributor").value = distributor.name;
    } catch (error) {
      console.error("Error loading distributor:", error);
      document.getElementById("distributor").value = "Error loading distributor";
    }
  }

  // Load areas and types when page loads
  window.addEventListener("load", function() {
    loadAreas();
    loadCylinderTypes();
  });

  // Handle form submission
  document.getElementById("bookingForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const bookingData = {
      name: document.getElementById("name").value,
      address: document.getElementById("area").value,
      type: document.getElementById("type").value,
      status: "Booked"
    };

    try {
      const response = await fetch("http://localhost:8080/api/bookings/create", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(bookingData)
      });

      const result = await response.text();
      alert(result);

      document.getElementById("bookingForm").reset();
      document.getElementById("distributor").value = "";
    } catch (error) {
      alert("Error connecting to backend!");
      console.error(error);
    }
  });
</script>

</body>
</html>
