<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Add Distributor - LPGChain</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: linear-gradient(135deg, #0b2c5c, #1e4d91);
      color: white;
    }

    .container {
      max-width: 500px;
      margin: 60px auto;
      background: white;
      color: black;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    h2 {
      text-align: center;
      color: #0b2c5c;
    }

    input, select {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #2f65d9;
      color: white;
      border: none;
      border-radius: 8px;
      margin-top: 15px;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background: #1e4fbf;
    }

    .back {
      text-align: center;
      margin-top: 15px;
    }

    .back a {
      color: #0b2c5c;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>➕ Add Distributor</h2>

  <form id="distributorForm">
    <input type="text" id="name" placeholder="Distributor Name" required>
    <input type="email" id="email" placeholder="Distributor Email" required>
    <input type="password" id="password" placeholder="Password" required>
    <input type="text" id="area" placeholder="Area / Address" required>

    <button type="submit">Add Distributor</button>
  </form>

  <div class="back">
    <a href="admin-dashboard.html">⬅ Back to Dashboard</a>
  </div>
</div>

<script>
document.getElementById("distributorForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const data = {
    name: document.getElementById("name").value,
    email: document.getElementById("email").value,
    password: document.getElementById("password").value,
    role: "DISTRIBUTOR"
  };

  try {
    const response = await fetch("http://localhost:8080/api/users/register", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    });

    const result = await response.text();
    alert(result);

    document.getElementById("distributorForm").reset();

  } catch (error) {
    alert("Error connecting to backend!");
    console.error(error);
  }
});
</script>

</body>
</html>
