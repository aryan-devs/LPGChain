<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Distributor Dashboard - LPGChain</title>
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>
  <div class="container">
    <h1>Distributor Dashboard</h1>

    <div class="card-grid">
      <div class="card">
        <h3>Total Stock Received</h3>
        <p>500</p>
      </div>
      <div class="card">
        <h3>Delivered</h3>
        <p>420</p>
      </div>
      <div class="card">
        <h3>Remaining Stock</h3>
        <p>80</p>
      </div>
    </div>

    <div class="section">
      <h2>Mark LPG Delivery</h2>
      <input type="text" placeholder="Customer Name / ID">
      <input type="number" placeholder="Number of Cylinders">
      <button>Mark Delivered</button>
    </div>

    <div class="section">
      <h2>Delivery Records</h2>
      <table>
        <tr>
          <th>Customer</th>
          <th>Quantity</th>
          <th>Status</th>
        </tr>
        <tr>
          <td>Customer 101</td>
          <td>1</td>
          <td>Delivered</td>
        </tr>
        <tr>
          <td>Customer 102</td>
          <td>1</td>
          <td>Delivered</td>
        </tr>
      </table>
    </div>
  </div>
</body>
</html>
